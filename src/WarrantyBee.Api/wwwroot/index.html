<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WarrantyBee API | Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffcc00;
            --primary-dark: #e6b800;
            --bg: #0a0a0c;
            --card-bg: #16161a;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .background-blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 204, 0, 0.15) 0%, rgba(255, 204, 0, 0) 70%);
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1) translate(-20%, -20%); }
            100% { transform: scale(1.2) translate(10%, 10%); }
        }

        .container {
            text-align: center;
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 500px;
            width: 90%;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .logo-container {
            width: 80px;
            height: 80px;
            background: var(--primary);
            border-radius: 1.5rem;
            margin: 0 auto 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.3);
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .logo-bee {
            font-size: 2.5rem;
        }

        h1 {
            font-weight: 800;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        p {
            color: var(--text-dim);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            margin-right: 10px;
            position: relative;
        }

        .status-dot::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--success);
            border-radius: 50%;
            animation: ripple 2s linear infinite;
        }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .tech-stack {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
        }

        .tech-tag {
            background: rgba(255, 255, 255, 0.03);
            padding: 0.25rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="background-blob"></div>
    
    <div class="container">
        <div class="logo-container">
            <span class="logo-bee">🐝</span>
        </div>
        
        <h1>WarrantyBee</h1>
        <p>Authoritative Backend Service Layer</p>
        
        <div class="status-badge">
            <div class="status-dot"></div>
            API is up and running
        </div>

        <div class="footer">
            <div class="tech-stack">
                <span class="tech-tag">.NET 8</span>
                <span class="tech-tag">SQL Server</span>
                <span class="tech-tag">REST</span>
            </div>
            <p style="margin-top: 1rem;">&copy; 2026 WarrantyBee Ecosystem</p>
        </div>
    </div>

    <script>
        // Dynamic message based on local time
        const hour = new Date().getHours();
        const p = document.querySelector('p');
        if (hour < 12) p.innerText = "Good morning! API service layer is optimized.";
        else if (hour < 18) p.innerText = "Good afternoon! Backend processing is active.";
        else p.innerText = "Good evening! Core services are operating smoothly.";
    </script>
</body>
</html>
