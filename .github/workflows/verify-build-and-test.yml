name: .NET Core CI

on:
  pull_request:
    branches: [ "main", "stage", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore WarrantyBee.sln
      
    - name: Build
      run: dotnet build WarrantyBee.sln --no-restore --configuration Release
      
    - name: Test
      run: dotnet test WarrantyBee.sln --no-build --configuration Release --verbosity normal
